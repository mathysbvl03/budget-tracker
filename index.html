/* ── TOAST ── */
function Toast({ico,msg,show}){
  return <div style={{position:"fixed",bottom:18,right:18,zIndex:9999,background:"#1a1f2e",border:"1px solid rgba(255,255,255,.15)",borderRadius:10,padding:"10px 18px",fontSize:13,color:"#e2e6f0",display:"flex",alignItems:"center",gap:8,boxShadow:"0 8px 32px rgba(0,0,0,.6)",pointerEvents:"none",transform:show?"translateY(0)":"translateY(70px)",opacity:show?1:0,transition:"all .3s cubic-bezier(.34,1.56,.64,1)"}}>
    <span>{ico}</span><span>{msg}</span>
  </div>;
}

/* ── DOUGHNUT ── */
function Doughnut({segments,total}){
  const R=80,r=54,cx=90,cy=90,circ=2*Math.PI*((R+r)/2);
  if(!segments.length)return(<svg width={180} height={180} viewBox="0 0 180 180"><circle cx={cx} cy={cy} r={(R+r)/2} fill="none" stroke="#1a1f2e" strokeWidth={R-r}/><text x={cx} y={cy+5} textAnchor="middle" fill="#454e65" fontSize={12}>Aucune dépense</text></svg>);
  let off=0;
  const arcs=segments.map(seg=>{const pct=seg.value/total,dash=pct*circ,gap=circ-dash;const el=<circle key={seg.id} cx={cx} cy={cy} r={(R+r)/2} fill="none" stroke={seg.col} strokeWidth={R-r} strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-off*circ}/>;off+=pct;return el;});
  return(<svg width={180} height={180} viewBox="0 0 180 180" style={{transform:"rotate(-90deg)"}}><circle cx={cx} cy={cy} r={(R+r)/2} fill="none" stroke="#1a1f2e" strokeWidth={R-r}/>{arcs}<text x={cx} y={cy-4} textAnchor="middle" fill="#e2e6f0" fontSize={13} fontWeight={700} style={{transform:`rotate(90deg)`,transformOrigin:`${cx}px ${cy}px`}}>{fmt(total)}</text><text x={cx} y={cy+13} textAnchor="middle" fill="#454e65" fontSize={10} style={{transform:`rotate(90deg)`,transformOrigin:`${cx}px ${cy}px`}}>ce mois</text></svg>);
}

/* ── SPARKLINE (mini bar chart) ── */
function Sparkline({data,color="#5eead4",height=40}){
  if(!data||data.length===0)return null;
  const max=Math.max(...data,1);
  const w=280,bw=Math.floor(w/data.length)-3;
  return(
    <svg width={w} height={height} viewBox={`0 0 ${w} ${height}`}>
      {data.map((v,i)=>{
        const bh=Math.max((v/max)*(height-4),2);
        return<rect key={i} x={i*(bw+3)} y={height-bh} width={bw} height={bh} rx={3} fill={color} opacity={i===data.length-1?1:.5}/>;
      })}
    </svg>
  );
}

  const getMember=id=>(members.find(m=>m.id===id)||{display_name:"?"});

  const sorted=[...monthExps].sort((a,b)=>new Date(a.date)-new Date(b.date));

  const expRows=sorted.map(e=>{

  const memberRows=members.map(m=>{
    const mt=monthExps.filter(e=>e.user_id===m.id).reduce((s,e)=>s+parseFloat(e.amount),0);
    const mr=revenues.find(r=>r.user_id===m.id&&r.month_key===k);

  .subtitle{color:#888;font-size:14px;margin-bottom:28px}.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}

  .footer{margin-top:40px;padding-top:16px;border-top:1px solid #eee;font-size:11px;color:#aaa;text-align:center}</style></head>

function AuthScreen({onLogin,showToast}){

  const [displayName,setDisplayName]=useState("");

  const submit=async()=>{
    if(!username.trim()||!password.trim()){showToast("⚠️","Remplissez tous les champs.");return;}
    setLoading(true);
    try{
      const hash=await hashStr(password);
      if(mode==="register"){
        if(!displayName.trim()){showToast("⚠️","Entrez un nom.");setLoading(false);return;}
        const exists=await db.get("users",`username=eq.${encodeURIComponent(username.trim())}&select=id`);
        if(exists&&exists.length>0){showToast("❌","Nom déjà pris.");setLoading(false);return;}
        const [u]=await db.post("users",{username:username.trim().toLowerCase(),password_hash:hash,display_name:displayName.trim(),avatar_color:avatarColor});
        localStorage.setItem("bmc_session",JSON.stringify(u));onLogin(u);
      }else{
        const us=await db.get("users",`username=eq.${encodeURIComponent(username.trim().toLowerCase())}&password_hash=eq.${hash}`);
        if(!us||us.length===0){showToast("❌","Identifiants incorrects.");setLoading(false);return;}
        localStorage.setItem("bmc_session",JSON.stringify(us[0]));onLogin(us[0]);
      }
    }catch(e){showToast("❌",e.message||"Erreur.");setLoading(false);}
  };
  return(
    <div style={{minHeight:"100vh",background:"#0c0e13",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>

        <div style={{fontSize:13,color:"#454e65",textAlign:"center",marginBottom:24}}>{mode==="login"?"Connectez-vous":"Créez votre compte"}</div>

      const mems=await db.get("space_members",`user_id=eq.${user.id}&select=space_id`);
      if(!mems||mems.length===0){setSpaces([]);setLoading(false);return;}
      const ids=mems.map(m=>m.space_id);
      const sps=await db.get("spaces",`id=in.(${ids.join(",")})&select=*`);
      const enriched=await Promise.all((sps||[]).map(async sp=>{
        const sm=await db.get("space_members",`space_id=eq.${sp.id}&select=user_id`);
        if(!sm||sm.length===0)return{...sp,members:[]};
        const us=await db.get("users",`id=in.(${sm.map(m=>m.user_id).join(",")})&select=display_name,avatar_color`);
        return{...sp,members:us||[]};
      }));
      setSpaces(enriched);
    }catch(e){showToast("❌","Erreur: "+e.message);}
    setLoading(false);
  },[user.id]);
  useEffect(()=>{loadSpaces();},[loadSpaces]);
  const createSpace=async()=>{
    if(!newName.trim()){showToast("⚠️","Entrez un nom.");return;}
    setCreating(true);
    try{const [sp]=await db.post("spaces",{name:newName.trim(),created_by:user.id});await db.post("space_members",{space_id:sp.id,user_id:user.id});setNewName("");showToast("✅","Espace créé !");loadSpaces();}
    catch(e){showToast("❌",e.message);}
    setCreating(false);
  };
  const joinSpace=async()=>{
    if(!joinCode.trim()){showToast("⚠️","Entrez un code.");return;}
    setJoining(true);
    try{
      const sps=await db.get("spaces",`invite_code=eq.${joinCode.trim().toUpperCase()}`);
      if(!sps||sps.length===0){showToast("❌","Code introuvable.");setJoining(false);return;}
      const sp=sps[0];
      const already=await db.get("space_members",`space_id=eq.${sp.id}&user_id=eq.${user.id}`);
      if(already&&already.length>0){showToast("ℹ️","Déjà membre.");setJoining(false);return;}
      await db.post("space_members",{space_id:sp.id,user_id:user.id});
      setJoinCode("");showToast("✅",`Rejoint "${sp.name}" !`);loadSpaces();
    }catch(e){showToast("❌",e.message);}
    setJoining(false);
  };
  return(
    <div style={{minHeight:"100vh",background:"#0c0e13",color:"#e2e6f0"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px",height:56,background:"rgba(12,14,19,.96)",borderBottom:"1px solid rgba(255,255,255,.06)",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,borderRadius:8,background:"linear-gradient(135deg,#5eead4,#f9a8d4)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,color:"#0c0e13"}}>M&C</div>
          <span style={{fontSize:15,fontWeight:700,background:"linear-gradient(135deg,#5eead4,#f9a8d4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Budget Tracker</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,borderRadius:"50%",background:user.avatar_color,color:"#0c0e13",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>{(user.display_name||"?")[0].toUpperCase()}</div>
          <span style={{fontSize:13,color:"#7e8aa3"}}>{user.display_name}</span>
          <button onClick={onLogout} style={{padding:"5px 12px",borderRadius:7,border:"1px solid rgba(255,255,255,.1)",background:"transparent",color:"#454e65",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Déco</button>
        </div>
      </div>
      <div style={{maxWidth:720,margin:"0 auto",padding:"24px 16px"}}>
        <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>Mes espaces budgétaires</div>
        <div style={{fontSize:13,color:"#454e65",marginBottom:20}}>Créez ou rejoignez un espace partagé.</div>
        {loading?<div style={{color:"#454e65",textAlign:"center",padding:40}}>Chargement…</div>:
          spaces.length===0?<div style={{color:"#454e65",textAlign:"center",padding:40,background:"#141720",borderRadius:14,marginBottom:14}}><div style={{fontSize:36,marginBottom:10,opacity:.4}}>🏠</div><p>Aucun espace. Créez-en un ci-dessous.</p></div>:
          spaces.map(sp=>(
            <div key={sp.id} onClick={()=>onEnterSpace(sp)}
              onMouseEnter={e=>{e.currentTarget.style.background="#1a1f2e";e.currentTarget.style.borderColor="rgba(255,255,255,.14)"}}
              onMouseLeave={e=>{e.currentTarget.style.background="#141720";e.currentTarget.style.borderColor="rgba(255,255,255,.08)"}}
              style={{background:"#141720",border:"1px solid rgba(255,255,255,.08)",borderRadius:14,padding:"14px 16px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all .2s"}}>
              <div>
                <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>{sp.name}</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{display:"flex"}}>{sp.members.slice(0,4).map((m,i)=><div key={i} style={{width:22,height:22,borderRadius:"50%",background:m.avatar_color,color:"#0c0e13",fontWeight:700,fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",marginLeft:i>0?-6:0,border:"2px solid #141720"}}>{(m.display_name||"?")[0].toUpperCase()}</div>)}</div>
                  <span style={{fontSize:11,color:"#454e65"}}>{sp.members.length} membre{sp.members.length>1?"s":""}</span>
                  <span style={{fontSize:11,color:"#5eead4",background:"rgba(94,234,212,.08)",padding:"2px 8px",borderRadius:4,fontFamily:"monospace"}}>{sp.invite_code}</span>
                </div>
              </div>
              <div style={{color:"#5eead4",fontSize:18}}>→</div>
            </div>
          ))
        }
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:8}}>
          <div style={{background:"#141720",border:"1px solid rgba(255,255,255,.08)",borderRadius:14,overflow:"hidden"}}>
            <div style={{padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,.06)",fontSize:13,fontWeight:600}}>✨ Créer</div>
            <div style={{padding:"12px 16px",display:"flex",gap:8}}><input style={inp} type="text" placeholder="Nom de l'espace" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createSpace()}/><button onClick={createSpace} disabled={creating} style={{padding:"9px 14px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#5eead4,#f9a8d4)",color:"#0c0e13",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{creating?"…":"OK"}</button></div>
          </div>
          <div style={{background:"#141720",border:"1px solid rgba(255,255,255,.08)",borderRadius:14,overflow:"hidden"}}>
            <div style={{padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,.06)",fontSize:13,fontWeight:600}}>🔗 Rejoindre</div>
            <div style={{padding:"12px 16px",display:"flex",gap:8}}><input style={{...inp,fontFamily:"monospace",letterSpacing:3,textTransform:"uppercase"}} type="text" maxLength={8} placeholder="CODE" value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&joinSpace()}/><button onClick={joinSpace} disabled={joining} style={{padding:"9px 14px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#5eead4,#f9a8d4)",color:"#0c0e13",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{joining?"…":"OK"}</button></div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── RECEIPT SCANNER ── */
function ReceiptScanner({onImport,onClose,showToast}){
  const [image,setImage]=useState(null);
  const [b64,setB64]=useState(null);
  const [scanning,setScanning]=useState(false);
  const [parsed,setParsed]=useState([]);
  const fileRef=useRef();
  const handleFile=e=>{const f=e.target.files[0];if(!f)return;setImage(URL.createObjectURL(f));const r=new FileReader();r.onload=ev=>setB64(ev.target.result.split(",")[1]);r.readAsDataURL(f);};
  const scan=async()=>{
    if(!b64){showToast("⚠️","Chargez une image.");return;}
    setScanning(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:`Analyse ce relevé/reçu. Réponds UNIQUEMENT avec un JSON array (pas de markdown):
[{"date":"YYYY-MM-DD","amount":0.00,"store":"nom","note":"description","category":"loyer|assurance|courses|resto|loisirs|abos|transport|sante|epargne|autre","payment":"CB|Prélèvement|Espèces|Virement"}]
Date manquante = ${todayStr()}`}]}]})});
      const data=await res.json();
      const text=data.content?.[0]?.text||"[]";
      const items=JSON.parse(text.replace(/\`\`\`json|\`\`\`/g,"").trim());
      setParsed(items.map(it=>({...it,amount:parseFloat(it.amount)||0})));
      showToast("✅",`${items.length} dépense${items.length>1?"s":""} détectée${items.length>1?"s":""}!`);
    }catch(e){showToast("❌","Erreur: "+e.message);}
    setScanning(false);
  };
  const update=(i,f,v)=>setParsed(p=>p.map((it,idx)=>idx===i?{...it,[f]:f==="amount"?parseFloat(v)||0:v}:it));
  const finp={background:"#0c0e13",border:"1px solid rgba(255,255,255,.1)",borderRadius:7,padding:"6px 9px",color:"#e2e6f0",fontSize:12,outline:"none",width:"100%",fontFamily:"inherit"};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",backdropFilter:"blur(8px)",zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#141720",border:"1px solid rgba(255,255,255,.12)",borderRadius:18,width:"100%",maxWidth:760,maxHeight:"90vh",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,.07)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{fontSize:15,fontWeight:600}}>📸 Scanner un relevé / reçu</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#454e65",cursor:"pointer",fontSize:22,lineHeight:1,padding:0}}>×</button>
        </div>
        <div style={{overflowY:"auto",flex:1,padding:"14px 18px"}}>
          <div onClick={()=>fileRef.current.click()} style={{border:`2px dashed ${image?"rgba(94,234,212,.3)":"rgba(255,255,255,.12)"}`,borderRadius:14,padding:"24px 16px",textAlign:"center",cursor:"pointer",marginBottom:12}}>
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
            {image?<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}><img src={image} alt="" style={{maxHeight:160,maxWidth:"100%",borderRadius:8,objectFit:"contain"}}/><span style={{fontSize:12,color:"#5eead4"}}>Cliquez pour changer</span></div>
            :<><div style={{fontSize:32,marginBottom:8,opacity:.5}}>📷</div><div style={{fontSize:14,color:"#7e8aa3"}}>Cliquez pour charger</div><div style={{fontSize:12,color:"#454e65",marginTop:4}}>Relevé bancaire, ticket, facture…</div></>}
          </div>
          {image&&!parsed.length&&<button onClick={scan} disabled={scanning} style={{width:"100%",padding:11,borderRadius:10,border:"none",background:scanning?"#1a1f2e":"linear-gradient(135deg,#5eead4,#f9a8d4)",color:scanning?"#454e65":"#0c0e13",fontSize:14,fontWeight:700,cursor:scanning?"not-allowed":"pointer",fontFamily:"inherit",marginBottom:12}}>{scanning?"🔍 Analyse en cours…":"🤖 Analyser avec l'IA"}</button>}
          {parsed.length>0&&(<>
            <div style={{fontSize:12,color:"#5eead4",marginBottom:10,fontWeight:600}}>{parsed.length} dépense{parsed.length>1?"s":""} — vérifiez :</div>
            {parsed.map((item,i)=>(
              <div key={i} style={{background:"#1a1f2e",borderRadius:12,padding:"11px 13px",marginBottom:8,border:"1px solid rgba(255,255,255,.07)"}}>
                <div style={{display:"grid",gridTemplateColumns:"100px 90px 1fr 1fr",gap:7,marginBottom:7}}>
                  {[["Date","date","date",item.date],["Montant €","amount","number",item.amount],["Enseigne","store","text",item.store],["Motif","note","text",item.note]].map(([lbl,field,type,val])=>(
                    <div key={field}><div style={{fontSize:9,color:"#454e65",textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>{lbl}</div><input type={type} value={val} onChange={e=>update(i,field,e.target.value)} style={finp}/></div>
                  ))}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:7,alignItems:"end"}}>
                  <div><div style={{fontSize:9,color:"#454e65",textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>Catégorie</div><select value={item.category} onChange={e=>update(i,"category",e.target.value)} style={{...finp,fontSize:11}}>{CATS.map(c=><option key={c.id} value={c.id}>{c.ico} {c.label}</option>)}</select></div>
                  <div><div style={{fontSize:9,color:"#454e65",textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>Paiement</div><select value={item.payment} onChange={e=>update(i,"payment",e.target.value)} style={{...finp,fontSize:11}}>{PAYS.map(p=><option key={p.id} value={p.id}>{p.ico} {p.label}</option>)}</select></div>
                  <button onClick={()=>setParsed(p=>p.filter((_,idx)=>idx!==i))} style={{width:28,height:28,borderRadius:6,background:"rgba(248,113,113,.1)",border:"1px solid rgba(248,113,113,.2)",color:"#f87171",cursor:"pointer",fontSize:13}}>🗑️</button>
                </div>
              </div>
            ))}
          </>)}
        </div>
        <div style={{padding:"12px 18px",borderTop:"1px solid rgba(255,255,255,.07)",display:"flex",gap:10,justifyContent:"flex-end",flexShrink:0}}>
          <button onClick={onClose} style={{padding:"9px 16px",borderRadius:9,border:"1px solid rgba(255,255,255,.1)",background:"transparent",color:"#7e8aa3",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Annuler</button>
          {parsed.length>0&&<button onClick={()=>{if(parsed.some(it=>!it.store||!it.note||it.amount<=0)){showToast("⚠️","Complétez les champs.");return;}onImport(parsed);onClose();}} style={{padding:"9px 18px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#5eead4,#f9a8d4)",color:"#0c0e13",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Importer {parsed.length} dépense{parsed.length>1?"s":""}</button>}
        </div>
      </div>
    </div>
  );
}

/* ── SPLIT MODAL ── */
function SplitModal({expense,members,currentUser,onClose,onCreated,showToast}){
  const other=members.find(m=>m.id!==currentUser.id);
  const half=parseFloat((parseFloat(expense.amount)/2).toFixed(2));
  const [notify,setNotify]=useState(true);
  const [saving,setSaving]=useState(false);
  if(!other)return null;
  const create=async()=>{
    setSaving(true);
    try{await db.post("splits",{expense_id:expense.id,space_id:expense.space_id,from_user_id:other.id,to_user_id:currentUser.id,amount:half,status:"pending",notify});showToast("✅","Demande envoyée !");onCreated();onClose();}
    catch(e){showToast("❌",e.message);}
    setSaving(false);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.78)",backdropFilter:"blur(8px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#141720",border:"1px solid rgba(255,255,255,.12)",borderRadius:16,padding:22,width:"100%",maxWidth:340,color:"#e2e6f0"}}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:3}}>✂️ Partager la dépense</div>
        <div style={{fontSize:13,color:"#454e65",marginBottom:18}}>Diviser en 2 parts égales</div>
        <div style={{background:"#1a1f2e",borderRadius:12,padding:"14px",marginBottom:14}}>
          <div style={{fontSize:12,color:"#454e65",marginBottom:8}}>{expense.store} — {expense.note}</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div><div style={{fontSize:11,color:"#454e65"}}>Total</div><div style={{fontSize:20,fontWeight:700,color:"#f87171"}}>{fmt(expense.amount)}</div></div>
            <div style={{fontSize:22,color:"#454e65"}}>÷2</div>
            <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#454e65"}}>{other.display_name} vous doit</div><div style={{fontSize:20,fontWeight:700,color:"#5eead4"}}>{fmt(half)}</div></div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#1a1f2e",borderRadius:10,padding:"12px",marginBottom:16,cursor:"pointer"}} onClick={()=>setNotify(n=>!n)}>
          <div><div style={{fontSize:13,fontWeight:500}}>🔔 Notifier {other.display_name}</div><div style={{fontSize:11,color:"#454e65",marginTop:2}}>Notification dans son app</div></div>
          <div style={{width:40,height:22,borderRadius:11,background:notify?"#5eead4":"#2a3040",position:"relative",transition:"background .2s",flexShrink:0}}>
            <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:notify?20:2,transition:"left .2s"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:10,borderRadius:9,border:"1px solid rgba(255,255,255,.11)",background:"transparent",color:"#7e8aa3",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Annuler</button>
          <button onClick={create} disabled={saving} style={{flex:1,padding:10,borderRadius:9,border:"none",background:"linear-gradient(135deg,#5eead4,#f9a8d4)",color:"#0c0e13",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{saving?"…":"Envoyer"}</button>
        </div>
      </div>
    </div>
  );
}

/* ── NOTIF PANEL ── */
function NotifPanel({splits,currentUser,members,onUpdate,showToast,onClose}){
  const getMember=id=>members.find(m=>m.id===id)||{display_name:"?",avatar_color:"#888"};
  const toAct=splits.filter(s=>s.from_user_id===currentUser.id&&s.status==="pending"&&s.notify);
  const waiting=splits.filter(s=>s.to_user_id===currentUser.id&&s.status==="pending");
  const done=splits.filter(s=>(s.from_user_id===currentUser.id||s.to_user_id===currentUser.id)&&s.status==="paid");
  const total=toAct.length+waiting.length;

    try{await db.patch("splits",`id=eq.${split.id}`,{status:paid?"paid":"reminded",responded_at:new Date().toISOString()});showToast(paid?"✅":"🔔",paid?"Virement confirmé !":"Rappel enregistré.");onUpdate();}
    catch(e){showToast("❌",e.message);}

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.78)",backdropFilter:"blur(8px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:"#141720",border:"1px solid rgba(255,255,255,.12)",borderRadius:16,width:"100%",maxWidth:420,maxHeight:"80vh",display:"flex",flexDirection:"column",color:"#e2e6f0"}}>

          {toAct.length>0&&<><div style={{fontSize:10,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"#f87171",marginBottom:9}}>⚡ Action requise</div>
            {toAct.map(s=>{const creditor=getMember(s.to_user_id);return(<div key={s.id} style={{background:"rgba(248,113,113,.06)",border:"1px solid rgba(248,113,113,.2)",borderRadius:12,padding:"13px",marginBottom:9,animation:"slidein .2s ease"}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:3}}>Avez-vous fait le virement à <span style={{color:creditor.avatar_color}}>{creditor.display_name}</span> ?</div>
              <div style={{fontSize:12,color:"#7e8aa3",marginBottom:11}}>Montant : <strong style={{color:"#5eead4"}}>{fmt(s.amount)}</strong></div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>respond(s,false)} style={{flex:1,padding:"8px",borderRadius:8,border:"1px solid rgba(255,255,255,.1)",background:"transparent",color:"#7e8aa3",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Non, pas encore</button>
                <button onClick={()=>respond(s,true)} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:"#4ade80",color:"#0c0e13",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>✓ Oui, c'est fait !</button>
              </div>
            </div>);})}</>}
          {waiting.length>0&&<><div style={{fontSize:10,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"#454e65",marginBottom:9,marginTop:toAct.length>0?12:0}}>⏳ Mes demandes</div>

/* ════════════════════════════════════════════════════
   BUDGET APP — main
════════════════════════════════════════════════════ */
function BudgetApp({user,space,onBack,showToast}){
  const now=new Date();
  const [tab,setTab]=useState("dashboard");
  const [month,setMonth]=useState(now.getMonth());
  const [year,setYear]=useState(now.getFullYear());
  const [viewUser,setViewUser]=useState("all");
  const [expenses,setExpenses]=useState([]);
  const [revenues,setRevenues]=useState([]);
  const [splits,setSplits]=useState([]);
  const [members,setMembers]=useState([]);
  const [modal,setModal]=useState(null);
  const [search,setSearch]=useState("");
  const [fCat,setFCat]=useState("");
  const [fPay,setFPay]=useState("");
  const [loading,setLoading]=useState(true);
  const [showScanner,setShowScanner]=useState(false);
  const [showNotif,setShowNotif]=useState(false);
  const [splitTarget,setSplitTarget]=useState(null);
  const [revInputs,setRevInputs]=useState({});
  const [budgets,setBudgets]=useState({});
  const [savingsGoal,setSavingsGoal]=useState(0);
  const [showBudgetModal,setShowBudgetModal]=useState(false);
  const [showSavingsModal,setShowSavingsModal]=useState(false);

  /* form: refs for text (avoids re-render/focus loss), useState for toggles only */
  const fDate=useRef(todayStr());
  const fAmt=useRef("");
  const fStore=useRef("");
  const fNote=useRef("");
  const [fCatSel,setFCatSel]=useState(null);
  const [fPaySel,setFPaySel]=useState(null);
  const isTyping=useRef(false);
  /* reset helper — updates DOM inputs directly without re-render */
  const resetForm=useCallback(()=>{
    fAmt.current=""; fStore.current=""; fNote.current="";
    fDate.current=todayStr();
    if(document.getElementById("fi-date"))document.getElementById("fi-date").value=todayStr();
    if(document.getElementById("fi-amt"))document.getElementById("fi-amt").value="";
    if(document.getElementById("fi-store"))document.getElementById("fi-store").value="";
    if(document.getElementById("fi-note"))document.getElementById("fi-note").value="";
    setFCatSel(null); setFPaySel(null);
  },[]);

  const pollRef=useRef();

  const loadData=useCallback(async(silent=false)=>{
    if(isTyping.current)return; /* don't reload while user is typing */
    try{
      const mems=await db.get("space_members",`space_id=eq.${space.id}&select=user_id`);
      const uids=(mems||[]).map(m=>m.user_id);
      const usrs=uids.length>0?await db.get("users",`id=in.(${uids.join(",")})&select=id,display_name,avatar_color,username`):[];
      setMembers(usrs||[]);
      const exps=await db.get("expenses",`space_id=eq.${space.id}&select=*&order=date.desc,created_at.desc`);
      setExpenses(exps||[]);
      const revs=await db.get("revenues",`space_id=eq.${space.id}&select=*`);
      setRevenues(revs||[]);
      const sps=await db.get("splits",`space_id=eq.${space.id}&select=*&order=created_at.desc`);
      setSplits(sps||[]);
    }catch(e){if(!silent)showToast("❌","Erreur: "+e.message);}
    setLoading(false);
  },[space.id]);

  useEffect(()=>{
    loadData();
    pollRef.current=setInterval(()=>loadData(true),10000);
    return()=>clearInterval(pollRef.current);
  },[loadData]);

  /* load budgets & savings goal from localStorage */
  useEffect(()=>{
    const k=mkKey(month,year);
    try{const b=localStorage.getItem(`bmc_budgets_${k}`);if(b)setBudgets(JSON.parse(b));}catch(_){}
    try{const g=localStorage.getItem(`bmc_savings_goal`);if(g)setSavingsGoal(parseFloat(g)||0);}catch(_){}
  },[month,year]);

  useEffect(()=>{localStorage.setItem("bmc_savings_goal",String(savingsGoal));},[savingsGoal]);

  const k=mkKey(month,year);
  const filteredExps=useMemo(()=>expenses.filter(e=>{const d=new Date(e.date);if(d.getMonth()!==month||d.getFullYear()!==year)return false;if(viewUser!=="all"&&e.user_id!==viewUser)return false;return true;}),[expenses,month,year,viewUser]);
  const total=useMemo(()=>filteredExps.reduce((s,e)=>s+parseFloat(e.amount),0),[filteredExps]);
  const rev=useMemo(()=>{if(viewUser==="all")return revenues.filter(r=>r.month_key===k).reduce((s,r)=>s+parseFloat(r.amount),0);const row=revenues.find(r=>r.user_id===viewUser&&r.month_key===k);return row?parseFloat(row.amount):0;},[revenues,viewUser,k]);
  const rest=rev-total;
  const savR=rev>0?Math.round((rest/rev)*100):0;
  const bycat=useMemo(()=>{const b={};CATS.forEach(c=>b[c.id]=0);filteredExps.forEach(e=>{if(b[e.category]!==undefined)b[e.category]+=parseFloat(e.amount)});return b;},[filteredExps]);
  const segments=useMemo(()=>CATS.filter(c=>bycat[c.id]>0).sort((a,b)=>bycat[b.id]-bycat[a.id]).map(c=>({...c,value:bycat[c.id]})),[bycat]);
  const getMember=useCallback(id=>members.find(m=>m.id===id)||{display_name:"?",avatar_color:"#888"},[members]);
  const myPendingNotifs=useMemo(()=>splits.filter(s=>s.from_user_id===user.id&&s.status==="pending"&&s.notify),[splits,user.id]);
  const getSplit=useCallback(expId=>splits.find(s=>s.expense_id===expId),[splits]);

  /* 6-month trend */
  const trendData=useMemo(()=>{
    const result=[];
    for(let i=5;i>=0;i--){
      let m=month-i,y=year;if(m<0){m+=12;y--;}
      const total=expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;}).reduce((s,e)=>s+parseFloat(e.amount),0);
      result.push({month:m,year:y,total,label:MONTHS_SHORT[m]});
    }
    return result;
  },[expenses,month,year]);

  const addExpense=async()=>{
    const amt=parseFloat(fAmt.current);
    const store=(fStore.current||"").trim();
    const note=(fNote.current||"").trim();
    const date=fDate.current;
    if(!date||!amt||amt<=0||!store||!note||!fCatSel||!fPaySel){showToast("⚠️","Remplissez tous les champs !");return;}
    try{
      const [e]=await db.post("expenses",{space_id:space.id,user_id:user.id,date,amount:amt,store,note,category:fCatSel,payment:fPaySel});
      setExpenses(prev=>[e,...prev]);
      resetForm();
      showToast("✅",`${fmt(amt)} ajouté !`);
    }catch(e){showToast("❌",e.message);}
  };

  const importFromScanner=async(items)=>{
    let added=0;
    for(const it of items){try{const [e]=await db.post("expenses",{space_id:space.id,user_id:user.id,date:it.date,amount:it.amount,store:it.store,note:it.note,category:it.category,payment:it.payment});setExpenses(prev=>[e,...prev]);added++;}catch(_){}}
    showToast("✅",`${added} dépense${added>1?"s":""} importée${added>1?"s":""}!`);
  };

  const delExp=async id=>{try{await db.delete("expenses",`id=eq.${id}`);setExpenses(prev=>prev.filter(e=>e.id!==id));showToast("🗑️","Supprimée.");}catch(e){showToast("❌",e.message);}};

  const openRevModal=()=>{const init={};members.forEach(m=>{const row=revenues.find(r=>r.user_id===m.id&&r.month_key===k);init[m.id]=String(row?row.amount:"");});setRevInputs(init);setModal("revenue");};
  const saveRevenue=async()=>{
    try{for(const [uid,val] of Object.entries(revInputs)){await db.upsert("revenues",{space_id:space.id,user_id:uid,month_key:k,amount:parseFloat(val)||0});}
    await loadData();setModal(null);showToast("💰","Revenus enregistrés !");}
    catch(e){showToast("❌",e.message);}
  };

  const finp={background:"#1a1f2e",border:"1px solid rgba(255,255,255,.11)",borderRadius:9,padding:"9px 12px",color:"#e2e6f0",fontSize:13,outline:"none",width:"100%",fontFamily:"inherit"};
  const card={background:"#141720",border:"1px solid rgba(255,255,255,.06)",borderRadius:14,overflow:"hidden"};
  const cardHd={padding:"12px 16px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"space-between"};
  const cardBd={padding:"14px 16px"};
  const flbl={fontSize:10,fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",color:"#454e65"};
  const tabStyle=t=>({flex:1,padding:"7px 8px",borderRadius:7,border:"none",background:tab===t?"#1a1f2e":"transparent",color:tab===t?"#e2e6f0":"#7e8aa3",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"});

  const KpiCard=({lbl,val,sub,accent,danger,success,editable,onClick})=>(
    <div onClick={onClick} style={{background:"#141720",border:"1px solid rgba(255,255,255,.06)",borderRadius:14,padding:"13px 14px",position:"relative",overflow:"hidden",cursor:onClick?"pointer":"default"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:accent}}/>
      <div style={{...flbl,marginBottom:6}}>{lbl}</div>
      <div style={{fontSize:20,fontWeight:700,fontVariantNumeric:"tabular-nums",letterSpacing:"-.5px",marginBottom:3,color:danger?"#f87171":success?"#4ade80":"#e2e6f0"}}>{val}</div>
      <div style={{fontSize:11,color:"#454e65"}}>{sub}</div>
      {editable&&<button onClick={e=>{e.stopPropagation();openRevModal();}} style={{position:"absolute",top:10,right:10,width:22,height:22,borderRadius:5,background:"#1a1f2e",border:"1px solid rgba(255,255,255,.06)",color:"#454e65",cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>✏️</button>}
    </div>
  );

  /* FormPanel is defined outside BudgetApp (see below) — rendered with stable props */

  /* ── BUDGET BARS ── */
  const BudgetBars=()=>{
    const cats=CATS.filter(c=>(parseFloat(budgets[c.id])||0)>0||(bycat[c.id]||0)>0);
    if(cats.length===0)return null;
    return(
      <div style={{...card,marginTop:13}}>
        <div style={{...cardHd,cursor:"pointer"}} onClick={()=>setShowBudgetModal(true)}>
          <span style={{fontSize:13,fontWeight:600}}>🎯 Budgets prévisionnels</span>
          <span style={{fontSize:11,color:"#5eead4"}}>Modifier →</span>
        </div>
        <div style={cardBd}>
          {cats.map(c=>{const budg=parseFloat(budgets[c.id])||0;const spent=bycat[c.id]||0;const pct=budg>0?Math.min((spent/budg)*100,100):0;const over=budg>0&&spent>budg;return(
            <div key={c.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:12}}>
                <span>{c.ico} {c.label}</span>
                <span style={{color:over?"#f87171":"#454e65",fontVariantNumeric:"tabular-nums"}}>{fmt(spent)}{budg>0?` / ${fmt(budg)}`:""}{over&&" ⚠️"}</span>
              </div>
              {budg>0&&<div style={{height:5,background:"#1a1f2e",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:over?"#f87171":pct>80?"#fbbf24":c.col,transition:"width .3s",borderRadius:3}}/></div>}
            </div>
          );})}
        </div>
      </div>
    );
  };

  /* ── TREND CHART ── */
  const TrendChart=()=>(
    <div style={{...card,marginTop:13}}>
      <div style={cardHd}><span style={{fontSize:13,fontWeight:600}}>📈 Évolution sur 6 mois</span></div>
      <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:8}}>
        <Sparkline data={trendData.map(d=>d.total)} color="#5eead4" height={50}/>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          {trendData.map((d,i)=>(
            <div key={i} style={{textAlign:"center"}}>
              <div style={{fontSize:10,color:"#454e65"}}>{d.label}</div>
              <div style={{fontSize:10,color:i===trendData.length-1?"#5eead4":"#7e8aa3",fontVariantNumeric:"tabular-nums"}}>{d.total>0?fmt(d.total).replace("€","").trim():"-"}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  const Dashboard=()=>(
    <div style={{display:"grid",gridTemplateColumns:"340px 1fr",gap:13}} className="mobile-grid">
      <div>
        <FormPanel
          user={user}
          fDate={fDate} fAmt={fAmt} fStore={fStore} fNote={fNote}
          isTyping={isTyping}
          fCatSel={fCatSel} setFCatSel={setFCatSel}
          fPaySel={fPaySel} setFPaySel={setFPaySel}
          budgets={budgets} bycat={bycat}
          onSubmit={addExpense}
          onScanner={()=>setShowScanner(true)}
          onBudgets={()=>setShowBudgetModal(true)}
        />
        <BudgetBars/>
      </div>
      <div>
        <div style={card}>
          <div style={cardHd}><span style={{fontSize:13,fontWeight:600}}>🥧 Répartition</span></div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:20,padding:14}}>
            <div style={{flexShrink:0}}><Doughnut segments={segments} total={total}/></div>
            <div style={{display:"flex",flexDirection:"column",gap:6,flex:1,minWidth:0}}>
              {segments.length===0?<span style={{color:"#454e65",fontSize:12}}>Aucune dépense ce mois.</span>
                :segments.map(s=><div key={s.id} style={{display:"flex",alignItems:"center",gap:7,fontSize:11}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:s.col,flexShrink:0}}/>
                  <span style={{color:"#7e8aa3",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.ico} {s.label}</span>
                  <span style={{color:"#e2e6f0",fontVariantNumeric:"tabular-nums",flexShrink:0}}>{fmt(s.value)}</span>
                </div>)}
            </div>
          </div>
        </div>
        <TrendChart/>
      </div>
    </div>
  );

  const Journal=()=>{
    let rows=[...filteredExps].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const q=search.toLowerCase();
    if(q)rows=rows.filter(e=>e.store.toLowerCase().includes(q)||e.note.toLowerCase().includes(q));
    if(fCat)rows=rows.filter(e=>e.category===fCat);
    if(fPay)rows=rows.filter(e=>e.payment===fPay);
    const tdB={padding:"9px 11px",fontSize:12,color:"#7e8aa3",whiteSpace:"nowrap",borderBottom:"1px solid rgba(255,255,255,.04)"};
    const can2=members.length===2;
    return(
      <div style={card}>
        <div style={{padding:"10px 14px",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:130,position:"relative"}}>
            <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:"#454e65",fontSize:13}}>🔍</span>
            <input style={{...finp,paddingLeft:28}} type="text" placeholder="Rechercher…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <select style={{...finp,width:"auto"}} value={fCat} onChange={e=>setFCat(e.target.value)}><option value="">Toutes catégories</option>{CATS.map(c=><option key={c.id} value={c.id}>{c.ico} {c.label}</option>)}</select>
          <select style={{...finp,width:"auto"}} value={fPay} onChange={e=>setFPay(e.target.value)}><option value="">Tous paiements</option>{PAYS.map(p=><option key={p.id} value={p.id}>{p.ico} {p.label}</option>)}</select>
          <button onClick={()=>exportPDF(expenses,revenues,splits,members,month,year,space)} style={{padding:"8px 13px",borderRadius:9,border:"1px solid rgba(165,180,252,.3)",background:"rgba(165,180,252,.08)",color:"#a5b4fc",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>📄 Export PDF</button>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["Date","Par","Enseigne","Motif","Catégorie","Paiement","Montant","Partage",""].map(h=><th key={h} style={{padding:"8px 11px",textAlign:h==="Montant"?"right":"left",fontSize:9,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"#454e65",borderBottom:"1px solid rgba(255,255,255,.06)",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
            <tbody>
              {rows.length===0?<tr><td colSpan={9}><div style={{padding:28,textAlign:"center",color:"#454e65"}}><div style={{fontSize:28,marginBottom:8,opacity:.4}}>🗂️</div><p>Aucune dépense.</p></div></td></tr>
              :rows.map(e=>{
                const d=new Date(e.date);
                const ds=`${DAYS[d.getDay()]} ${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
                const cat=CATS.find(c=>c.id===e.category)||{col:"#94a3b8",ico:"✨",label:"Autre"};
                const m=getMember(e.user_id);const isMe=e.user_id===user.id;
                const split=getSplit(e.id);
                return(
                  <tr key={e.id} onMouseEnter={ev=>ev.currentTarget.style.background="#1a1f2e"} onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>
                    <td style={{...tdB,color:"#454e65",fontSize:11}}>{ds}</td>
                    <td style={tdB}><div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:20,height:20,borderRadius:"50%",background:m.avatar_color,color:"#0c0e13",fontWeight:700,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center"}}>{(m.display_name||"?")[0].toUpperCase()}</div><span style={{fontSize:11,color:isMe?"#5eead4":"#7e8aa3"}}>{isMe?"Vous":m.display_name}</span></div></td>
                    <td style={{...tdB,color:"#e2e6f0",fontWeight:600}}>{e.store}</td>
                    <td style={tdB}>{e.note}</td>
                    <td style={tdB}><span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 6px",borderRadius:5,fontSize:11,fontWeight:500,background:cat.col+"22",color:cat.col}}>{cat.ico} {cat.label}</span></td>
                    <td style={{...tdB,fontSize:11}}>{e.payment}</td>
                    <td style={{...tdB,textAlign:"right",color:"#f87171",fontSize:13,fontWeight:700,fontVariantNumeric:"tabular-nums"}}>−{fmt(e.amount)}</td>
                    <td style={tdB}>
                      {split?(
                        split.status==="paid"?<span style={{fontSize:11,color:"#4ade80",background:"rgba(74,222,128,.1)",border:"1px solid rgba(74,222,128,.2)",borderRadius:6,padding:"2px 7px",whiteSpace:"nowrap"}}>✓ Effectué</span>
                        :split.status==="reminded"?<span style={{fontSize:11,color:"#fbbf24",background:"rgba(251,191,36,.1)",border:"1px solid rgba(251,191,36,.2)",borderRadius:6,padding:"2px 7px",whiteSpace:"nowrap"}}>🔔 Rappel</span>
                        :<span style={{fontSize:11,color:"#f87171",background:"rgba(248,113,113,.1)",border:"1px solid rgba(248,113,113,.2)",borderRadius:6,padding:"2px 7px",whiteSpace:"nowrap"}}>{getMember(split.from_user_id).display_name} doit {fmt(split.amount)}</span>
                      ):isMe&&can2?<button onClick={()=>setSplitTarget(e)} style={{fontSize:11,color:"#a5b4fc",background:"rgba(165,180,252,.08)",border:"1px solid rgba(165,180,252,.2)",borderRadius:6,padding:"3px 8px",cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>✂️ Partager</button>:null}
                    </td>
                    <td style={{...tdB,padding:"9px 7px"}}>{isMe&&<button onClick={()=>delExp(e.id)} onMouseEnter={ev=>{ev.currentTarget.style.background="rgba(248,113,113,.12)";ev.currentTarget.style.color="#f87171"}} onMouseLeave={ev=>{ev.currentTarget.style.background="transparent";ev.currentTarget.style.color="#454e65"}} style={{width:24,height:24,borderRadius:5,background:"transparent",border:"1px solid transparent",color:"#454e65",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>🗑️</button>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  const GroupView=()=>{
    const byMember=members.map(m=>{const mE=expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===month&&d.getFullYear()===year&&e.user_id===m.id;});return{...m,total:mE.reduce((s,e)=>s+parseFloat(e.amount),0),count:mE.length,exps:mE};});
    const grandTotal=byMember.reduce((s,m)=>s+m.total,0);const target=members.length>0?grandTotal/members.length:0;
    const byCat=CATS.map(cat=>({...cat,...Object.fromEntries(byMember.map(m=>[m.id,m.exps.filter(e=>e.category===cat.id).reduce((s,e)=>s+parseFloat(e.amount),0)]))})).filter(c=>byMember.some(m=>c[m.id]>0));
    return(<>
      <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(members.length,4)},1fr)`,gap:11,marginBottom:13}}>
        {byMember.sort((a,b)=>b.total-a.total).map(m=>(
          <div key={m.id} style={{background:"linear-gradient(135deg,#1a1f2e,#212840)",border:"1px solid rgba(255,255,255,.1)",borderRadius:14,padding:14,textAlign:"center"}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:m.avatar_color,color:"#0c0e13",fontWeight:700,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 7px"}}>{(m.display_name||"?")[0].toUpperCase()}</div>
            <div style={{fontSize:11,color:"#454e65",textTransform:"uppercase",letterSpacing:".07em",marginBottom:3}}>{m.display_name}</div>
            <div style={{fontSize:22,fontWeight:700,color:m.avatar_color,fontVariantNumeric:"tabular-nums"}}>{fmt(m.total)}</div>
            <div style={{fontSize:11,color:"#7e8aa3",marginTop:2}}>{m.count} dépense{m.count!==1?"s":""}</div>
          </div>
        ))}
      </div>
      <div style={{...card,marginBottom:13}}><div style={cardHd}><span style={{fontSize:13,fontWeight:600}}>⚖️ Équilibrage</span></div>
        <div style={{padding:20}}>
          {grandTotal===0?<p style={{textAlign:"center",color:"#454e65"}}>Aucune dépense ce mois-ci.</p>:<>
            <div style={{fontSize:12,color:"#454e65",textAlign:"center",marginBottom:14}}>Total : <strong style={{color:"#e2e6f0"}}>{fmt(grandTotal)}</strong> — Cible : <strong style={{color:"#e2e6f0"}}>{fmt(target)}</strong>/pers.</div>
            {byMember.map(m=>{const diff=m.total-target;return(<div key={m.id} style={{display:"flex",alignItems:"center",gap:9,marginBottom:9}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:m.avatar_color,color:"#0c0e13",fontWeight:700,fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{(m.display_name||"?")[0].toUpperCase()}</div>
              <div style={{flex:1,height:6,background:"#1a1f2e",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min((m.total/Math.max(grandTotal,1))*100,100)}%`,background:m.avatar_color,transition:"width .4s"}}/></div>
              <div style={{fontSize:11,fontVariantNumeric:"tabular-nums",width:130,textAlign:"right"}}><span style={{color:m.avatar_color}}>{fmt(m.total)}</span><span style={{color:diff>0.01?"#4ade80":diff<-0.01?"#f87171":"#454e65",fontSize:10,marginLeft:5}}>{diff>0.01?`+${fmt(diff)}`:diff<-0.01?fmt(diff):"✓"}</span></div>
            </div>);})}
            {members.length===2&&(()=>{const [a,b]=[...byMember].sort((x,y)=>y.total-x.total);const diff=Math.abs(a.total-b.total)/2;return diff>0.01&&<div style={{marginTop:14,padding:"12px",background:"rgba(94,234,212,.06)",border:"1px solid rgba(94,234,212,.15)",borderRadius:10,textAlign:"center",fontSize:13}}><strong style={{color:b.avatar_color}}>{b.display_name}</strong>{" doit "}<strong style={{fontSize:17}}>{fmt(diff)}</strong>{" à "}<strong style={{color:a.avatar_color}}>{a.display_name}</strong></div>})()}
          </>}
        </div>
      </div>
      {byCat.length>0&&<div style={card}><div style={cardHd}><span style={{fontSize:13,fontWeight:600}}>📊 Par catégorie</span></div>
        <div style={{padding:"13px 14px"}}>
          {byCat.map(cat=>(<div key={cat.id} style={{display:"flex",alignItems:"center",gap:9,marginBottom:10}}>
            <div style={{fontSize:11,color:"#7e8aa3",width:85,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cat.ico} {cat.label}</div>
            <div style={{flex:1,height:6,background:"#1a1f2e",borderRadius:4,overflow:"hidden",display:"flex"}}>{members.map((m,i)=>{const v=cat[m.id]||0;const mx=Math.max(...members.map(mm=>cat[mm.id]||0),1);return<div key={m.id} style={{height:"100%",width:`${(v/mx)*Math.floor(94/members.length)}%`,background:m.avatar_color,marginRight:2,transition:"width .4s"}}/>;})}</div>
            <div style={{display:"flex",gap:8,flexShrink:0}}>{members.map(m=><span key={m.id} style={{fontSize:10,color:m.avatar_color,fontVariantNumeric:"tabular-nums",minWidth:50,textAlign:"right"}}>{fmt(cat[m.id]||0)}</span>)}</div>
          </div>))}
          <div style={{display:"flex",gap:12,marginTop:7,fontSize:11}}>{members.map(m=><span key={m.id} style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:m.avatar_color,display:"inline-block"}}/><span style={{color:"#7e8aa3"}}>{m.display_name}</span></span>)}</div>
        </div>
      </div>}
    </>);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#0c0e13",color:"#e2e6f0",fontFamily:"'Segoe UI',system-ui,sans-serif",fontSize:14,overflow:"hidden"}}>
      {/* HEADER */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",height:52,background:"rgba(12,14,19,.97)",borderBottom:"1px solid rgba(255,255,255,.06)",flexShrink:0,gap:8,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={onBack} style={{background:"none",border:"none",color:"#454e65",cursor:"pointer",fontSize:17,padding:0,lineHeight:1}}>←</button>
          <div style={{width:26,height:26,borderRadius:7,background:"linear-gradient(135deg,#5eead4,#f9a8d4)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:10,color:"#0c0e13"}}>M&C</div>
          <div><div style={{fontSize:13,fontWeight:700,lineHeight:1.2}}>{space.name}</div><div style={{fontSize:9,color:"#454e65"}}>Code : {space.invite_code}</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:5,background:"#1a1f2e",border:"1px solid rgba(255,255,255,.09)",borderRadius:8,padding:"4px 9px"}}>
            <span style={{fontSize:11}}>📅</span>
            <select style={{background:"transparent",border:"none",color:"#e2e6f0",fontSize:12,outline:"none",cursor:"pointer"}} value={month} onChange={e=>setMonth(parseInt(e.target.value))}>{MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>
            <select style={{background:"transparent",border:"none",color:"#e2e6f0",fontSize:12,outline:"none",cursor:"pointer"}} value={year} onChange={e=>setYear(parseInt(e.target.value))}>{[2023,2024,2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}</select>
          </div>
          <div style={{display:"flex",gap:2,background:"#141720",border:"1px solid rgba(255,255,255,.06)",borderRadius:8,padding:2}}>
            <button onClick={()=>setViewUser("all")} style={{padding:"3px 8px",borderRadius:6,border:"none",background:viewUser==="all"?"#1a1f2e":"transparent",color:viewUser==="all"?"#e2e6f0":"#454e65",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Tous</button>
            {members.map(m=><button key={m.id} onClick={()=>setViewUser(m.id)} style={{padding:"3px 8px",borderRadius:6,border:"none",background:viewUser===m.id?m.avatar_color+"22":"transparent",color:viewUser===m.id?m.avatar_color:"#454e65",fontSize:11,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{m.display_name}</button>)}
          </div>
          <button onClick={()=>setShowNotif(true)} style={{position:"relative",width:32,height:32,borderRadius:8,background:"#1a1f2e",border:"1px solid rgba(255,255,255,.09)",color:"#7e8aa3",cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>
            🔔{myPendingNotifs.length>0&&<span style={{position:"absolute",top:4,right:4,width:7,height:7,borderRadius:"50%",background:"#f87171",border:"1.5px solid #0c0e13"}}/>}
          </button>
          <div style={{fontSize:10,color:"#454e65",display:"flex",alignItems:"center",gap:4}}><div style={{width:5,height:5,borderRadius:"50%",background:"#4ade80",animation:"pulse 2s infinite"}}/>Live</div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
        {loading?<div style={{color:"#454e65",textAlign:"center",padding:60}}>Chargement…</div>:<>
          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:12}}>
            <KpiCard lbl="💰 Revenus" val={fmt(rev)} sub={viewUser==="all"?"Tous membres":"Mon revenu"} accent="#5eead4" editable/>
            <KpiCard lbl="💸 Dépensé" val={fmt(total)} sub={`${filteredExps.length} opération${filteredExps.length>1?"s":""}`} accent="#f87171"/>
            <KpiCard lbl="🏦 Reste" val={fmt(rest)} sub="Après dépenses" accent={rest<0?"#f87171":"#4ade80"} danger={rest<0} success={rest>0}/>
            <KpiCard lbl="📊 Épargne" val={`${savR}%`}
              sub={savingsGoal>0?`Obj. ${fmt(savingsGoal)}`:savR>=20?"🎉 Objectif !":"Objectif : 20%"}
              accent={savR<0?"#f87171":savR>=20?"#4ade80":"#fbbf24"} danger={savR<0} success={savR>=20}
              onClick={()=>setShowSavingsModal(true)}/>
          </div>
          {/* TABS */}
          <div style={{display:"flex",gap:2,background:"#141720",border:"1px solid rgba(255,255,255,.06)",borderRadius:9,padding:3,marginBottom:12}}>
            <button style={tabStyle("dashboard")} onClick={()=>setTab("dashboard")}>📊 Tableau de bord</button>
            <button style={tabStyle("journal")} onClick={()=>setTab("journal")}>📋 Journal</button>
            <button style={tabStyle("group")} onClick={()=>setTab("group")}>👫 Vue Groupe</button>
          </div>
          {tab==="dashboard"&&<Dashboard/>}
          {tab==="journal"&&<Journal/>}
          {tab==="group"&&<GroupView/>}
        </>}
      </div>

      {/* REVENUE MODAL */}
      {modal==="revenue"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.78)",backdropFilter:"blur(8px)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>{if(e.target===e.currentTarget)setModal(null)}}>
          <div style={{background:"#141720",border:"1px solid rgba(255,255,255,.12)",borderRadius:14,padding:20,width:"100%",maxWidth:310}}>
            <div style={{fontSize:15,fontWeight:600,marginBottom:13}}>💰 Revenus — {MONTHS[month]} {year}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {members.map(m=>(
                <div key={m.id} style={{display:"flex",flexDirection:"column",gap:4}}>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",color:m.avatar_color}}>{m.display_name} (€)</div>
                  <input type="number" placeholder="0" value={revInputs[m.id]||""} onChange={e=>setRevInputs(r=>({...r,[m.id]:e.target.value}))} style={{background:"#1a1f2e",border:"1px solid rgba(255,255,255,.11)",borderRadius:9,padding:"9px 12px",color:"#e2e6f0",fontSize:13,outline:"none",width:"100%",fontFamily:"inherit"}}/>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:9,marginTop:14}}>
              <button onClick={()=>setModal(null)} style={{flex:1,padding:9,borderRadius:9,border:"1px solid rgba(255,255,255,.1)",background:"transparent",color:"#7e8aa3",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Annuler</button>
              <button onClick={saveRevenue} style={{flex:1,padding:9,borderRadius:9,border:"none",background:"#5eead4",color:"#0c0e13",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Enregistrer</button>
            </div>
          </div>
        </div>
      )}

      {splitTarget&&<SplitModal expense={splitTarget} members={members} currentUser={user} onClose={()=>setSplitTarget(null)} onCreated={()=>loadData()} showToast={showToast}/>}
      {showNotif&&<NotifPanel splits={splits} currentUser={user} members={members} onUpdate={()=>loadData()} showToast={showToast} onClose={()=>setShowNotif(false)}/>}
      {showScanner&&<ReceiptScanner onImport={importFromScanner} onClose={()=>setShowScanner(false)} showToast={showToast}/>}
      {showBudgetModal&&<BudgetGoalsModal budgets={budgets} setBudgets={setBudgets} expenses={expenses} month={month} year={year} onClose={()=>setShowBudgetModal(false)}/>}
      {showSavingsModal&&<SavingsGoalModal goal={savingsGoal} setGoal={setSavingsGoal} current={Math.max(rest,0)} onClose={()=>setShowSavingsModal(false)}/>}
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);
  const [space,setSpace]=useState(null);
  const [toast,setToast]=useState({show:false,ico:"",msg:""});
  const timer=useRef(null);
  useEffect(()=>{try{const s=localStorage.getItem("bmc_session");if(s)setUser(JSON.parse(s));}catch(_){}}, []);
  const showToast=(ico,msg)=>{clearTimeout(timer.current);setToast({show:true,ico,msg});timer.current=setTimeout(()=>setToast(t=>({...t,show:false})),3200);};
  const logout=()=>{localStorage.removeItem("bmc_session");setUser(null);setSpace(null);};
  if(!user)return(<><AuthScreen onLogin={u=>{setUser(u);showToast("👋",`Bienvenue, ${u.display_name} !`);}} showToast={showToast}/><Toast {...toast}/></>);
  if(!space)return(<><SpacesScreen user={user} onEnterSpace={s=>{setSpace(s);showToast("🏠",`Espace "${s.name}" ouvert !`);}} showToast={showToast} onLogout={logout}/><Toast {...toast}/></>);
  return(<><BudgetApp user={user} space={space} onBack={()=>setSpace(null)} showToast={showToast}/><Toast {...toast}/></>);
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
